# Adresse de base pour GitHub Pages
baseURL: "https://pellierd.github.io/miai-hubot-chair/"
locale: "en-us"
title: "MIAI Hubot Chair"

# Le nom du dossier de votre thème dans /themes
theme: "blowfish"
themesDir: "themes" # <--- AJOUTÉ ICI pour corriger l'erreur sans installer Go

# Configuration des menus
menu:
  main:
    - name: "Home"
      pageRef: "/"
      weight: 10
    - name: "Research"
      pageRef: "/research"
      weight: 20
    - name: "About"
      pageRef: "/about"
      weight: 30

# Paramètres spécifiques à Blowfish
params:
  description: "MIAI Hubot Chair Research Project Website"
  
  # Structure attendue par Blowfish pour l'auteur :
  author:
    name: "Damien Pellier"
    image: "profile.jpg"
    bio: "MIAI Hubot Chair Team"
  
  # Options de style pour l'effet IA / Robotique
  defaultAppearance: "dark"
  mainSections: ["research", "posts"]
  enableSearch: true
