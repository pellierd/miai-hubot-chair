# Adresse de base pour GitHub Pages
baseURL: "https://pellierd.github.io/miai-hubot-chair/"
locale: "en-us"
title: "MIAI Hubot Chair"

theme: "blowfish"
themesDir: "themes"

# Configuration des menus
menu:
  main:
    - name: "Home"
      pageRef: "/"
      weight: 10
    - name: "Research"
      pageRef: "/research"
      weight: 20
    - name: "About"
      pageRef: "/about"
      weight: 30

# Paramètres spécifiques à Blowfish
params:
  description: "MIAI Hubot Chair Research Project Website"
  
  author:
    name: "Damien Pellier"
    image: "profile.jpg"
    bio: "MIAI Hubot Chair Team"
  
  defaultAppearance: "dark"
  mainSections: ["research", "posts"]
  enableSearch: true
  
  # 👇 AJOUTEZ CETTE LIGNE ICI
  homepageLayout: "page"
