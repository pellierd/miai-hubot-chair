# Adresse de base pour GitHub Pages
baseURL: "https://pellierd.github.io/miai-hubot-chair/"
locale: "en-us"
title: "MIAI Hubot Chair"

# Le nom du dossier de votre thème dans /themes
theme: "blowfish"

# Configuration des menus (adaptée pour Blowfish avec pageRef)
menu:
  main:
    - name: "Home"
      pageRef: "/"
      weight: 10
    - name: "Research"
      pageRef: "/research"
      weight: 20
    - name: "About"
      pageRef: "/about"
      weight: 30

# Paramètres spécifiques au projet et à Blowfish
params:
  description: "MIAI Hubot Chair Research Project Website"
  author: "Damien Pellier / MIAI Hubot Chair Team"
  
  # Options de style pour l'effet IA / Robotique
  defaultAppearance: "dark" # Mode sombre par défaut
  mainSections: ["research", "posts"]
  enableSearch: true
